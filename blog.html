<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Raffael Kaas - Blog</title>

  <meta name="description" content="Raffael Kaas - Blog">
  <meta name="author" content="Raffael Kaas">
  <link rel="canonical" href="https://rkaas.de/blog/">
  <link rel="icon" type="image/png" href="favicon.png">

  <meta property="og:title" content="Raffael Kaas - Blog">
  <meta property="og:description" content="Personal writing by Raffael Kaas">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rkaas.de/blog/">
  <meta property="og:image" content="https://rkaas.de/assets/img/me.png">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Raffael Kaas">
  <meta name="twitter:description" content="Personal writing by Raffael Kaas">
  <meta name="twitter:image" content="https://rkaas.de/assets/img/me.png">

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const post = params.get('post');
      if (post && /^[a-z0-9-]+$/.test(post) && !params.has('legacy') && window.location.protocol !== 'file:') {
        window.location.replace('/blog/' + post + '/');
      }
    })();
  </script>

  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <link rel="stylesheet" type="text/css" href="css/style.css">

  <!-- Structured Data: Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Raffael Kaas",
    "jobTitle": "Software Engineer",
    "url": "https://rkaas.de/",
    "image": "https://rkaas.de/assets/img/me.png",
    "sameAs": [
      "https://www.linkedin.com/in/raffael-kaas-4b0869152"
    ],
    "knowsAbout": ["Embedded Systems", "ROS", "Linux", "C++", "Python", "ADAS", "Automotive"]
  }
  </script>
</head>
<body class="blog-page">
  <h1 class="sr-only">Raffael Kaas - Blog</h1>

  <header class="site-header" id="top">
    <a class="site-brand" href="/" aria-label="Raffael Kaas homepage">
      <img src="assets/img/me.png" alt="" class="site-brand-avatar">
      <span class="site-brand-copy">
        <span class="site-brand-name">Raffael Kaas</span>
      </span>
    </a>

    <button class="pb-theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
      <span class="sr-only">Toggle dark mode</span>
    </button>
  </header>

  <main class="blog-page-main">
    <div id="blog" class="pb-container blog-article-shell"></div>
  </main>

  <footer class="site-footer">
    <div class="pb-container site-footer-inner">
      <div class="footer-links" aria-label="Contact links">
        <a class="footer-link" href="mailto:mail@rkaas.de">mail@rkaas.de</a>
        <a class="footer-link" href="https://www.linkedin.com/in/raffael-kaas-4b0869152" target="_blank" rel="me noopener">LinkedIn</a>
      </div>
      <p class="footer-copyright">© 2026 Raffael Kaas. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function () {
      const themeToggle = document.querySelector('.pb-theme-toggle');

      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        try {
          localStorage.setItem('theme', theme);
        } catch (e) {}
        if (themeToggle) {
          themeToggle.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
        }
      }

      setTheme(document.documentElement.getAttribute('data-theme') || 'light');

      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
          setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    function parseFrontMatterValue(value) {
      let val = value.trim();

      if (val.startsWith('[') && val.endsWith(']')) {
        try {
          return JSON.parse(val);
        } catch (e) {
          return val.slice(1, -1).split(',').map(item => item.trim().replace(/^['"]|['"]$/g, ''));
        }
      }

      if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
        val = val.slice(1, -1);
      }
      if (val === 'true' || val === 'false') return val === 'true';
      if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
      if (!Number.isNaN(Number(val)) && val !== '') return Number(val);
      return val;
    }

    function parseFrontMatter(text) {
      const fmRegex = /^---\n([\s\S]*?)\n---\n?/;
      const match = text.match(fmRegex);
      if (!match) return { fm: null, body: text };
      const fm = {};
      match[1].split(/\r?\n/).forEach(line => {
        if (!line.trim() || line.trim().startsWith('#')) return;
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.slice(0, idx).trim();
        fm[key] = parseFrontMatterValue(line.slice(idx + 1));
      });
      return { fm, body: text.replace(fmRegex, '') };
    }

    function setOrCreateMeta(name, content, attr = 'name') {
      if (!content) return;
      let el = document.head.querySelector(`meta[${attr}="${name}"]`);
      if (!el) {
        el = document.createElement('meta');
        el.setAttribute(attr, name);
        document.head.appendChild(el);
      }
      el.setAttribute('content', content);
    }

    function setOrCreateLink(rel, href) {
      if (!href) return;
      let el = document.head.querySelector(`link[rel="${rel}"]`);
      if (!el) {
        el = document.createElement('link');
        el.setAttribute('rel', rel);
        document.head.appendChild(el);
      }
      el.setAttribute('href', href);
    }

    function absoluteUrl(pathOrUrl) {
      if (!pathOrUrl) return null;
      try {
        return new URL(pathOrUrl, window.location.origin).toString();
      } catch(e) { return pathOrUrl; }
    }

    async function loadBlogPost() {
      const blogContainer = document.querySelector('#blog');
      const blogDir = '/assets/blog/';
      const urlParams = new URLSearchParams(window.location.search);
      const post = urlParams.get('post');
  
      if (!post) {
        blogContainer.innerHTML = '<p>No blog post specified.</p>';
        return;
      }
  
      try {
        let response = await fetch(`${blogDir}${post}.md`, { cache: 'no-store' });
        if (!response.ok) {
          response = await fetch(`${blogDir}${post}.html`, { cache: 'no-store' });
        }
        if (!response.ok) {
          console.error('Fetch failed for both .md and .html', response.status, response.statusText);
          throw new Error('Blog post not found');
        }
        const markdown = await response.text();
        const { fm, body } = parseFrontMatter(markdown);
        const postDiv = document.createElement('div');
        postDiv.classList.add('blog-post');

        if (fm && fm.titleImage) {
          const titleImage = document.createElement('img');
          titleImage.className = 'blog-title-image';
          titleImage.src = fm.titleImage;
          titleImage.alt = fm.titleImageAlt || '';
          titleImage.decoding = 'async';
          titleImage.fetchPriority = 'high';
          if (!fm.titleImageAlt) {
            titleImage.setAttribute('aria-hidden', 'true');
          }
          postDiv.appendChild(titleImage);
        } else {
          const titleImagePlaceholder = document.createElement('div');
          titleImagePlaceholder.className = 'blog-title-image-placeholder';
          titleImagePlaceholder.setAttribute('aria-hidden', 'true');
          postDiv.appendChild(titleImagePlaceholder);
        }

        if (fm && fm.title) {
          const h1 = document.createElement('h1');
          h1.textContent = fm.title;
          postDiv.appendChild(h1);

          const meta = document.createElement('p');
          meta.className = 'post-meta';
          const parts = [];
          if (fm.date) {
            try {
              const dt = new Date(fm.date);
              parts.push(dt.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: '2-digit' }));
            } catch(e) { parts.push(fm.date); }
          }
          if (fm.readingTime) {
            parts.push(`${fm.readingTime} min read`);
          }
          if (parts.length) {
            meta.textContent = parts.join(' • ');
            postDiv.appendChild(meta);
          }
        }

        postDiv.insertAdjacentHTML('beforeend', marked.parse(body));
        blogContainer.appendChild(postDiv);

        const isGalleryParent = (el) => el && el.closest('.garmin-app, .finisher-photo');
        const imgs = postDiv.querySelectorAll('img');
        imgs.forEach(img => {
          if (img.classList.contains('blog-title-image')) return;
          if (isGalleryParent(img)) return;
          if (img.closest('figure')) return;
          const figure = document.createElement('figure');
          figure.className = 'blog-figure';
          img.parentNode.insertBefore(figure, img);
          figure.appendChild(img);

          const captionText = img.getAttribute('title') || img.getAttribute('alt');
          if (captionText && captionText.trim().length > 0) {
            const cap = document.createElement('figcaption');
            cap.textContent = captionText.trim();
            figure.appendChild(cap);
          }
        });

        // Lazy-load images only for the long roadtrip post
        if (post === 'roadtrip-from-perth-to-sydney') {
          postDiv.querySelectorAll('img').forEach(img => {
            if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
          });
        }

        if (fm) {
          const title = fm.title ? `${fm.title} – Raffael Kaas` : document.title;
          if (fm.title) document.title = title;

          setOrCreateMeta('description', fm.description || '');
          setOrCreateMeta('author', fm.author || 'Raffael Kaas');

          const canonical = fm.canonical || `${window.location.origin}/blog/${fm.slug || post}/`;
          setOrCreateLink('canonical', canonical);

          setOrCreateMeta('og:title', fm.title || '', 'property');
          setOrCreateMeta('og:description', fm.description || '', 'property');
          setOrCreateMeta('og:type', 'article', 'property');
          setOrCreateMeta('og:url', canonical, 'property');
          const ogImgAbs = absoluteUrl(fm.ogImage || '/assets/img/me.png');
          setOrCreateMeta('og:image', ogImgAbs, 'property');

          setOrCreateMeta('twitter:card', 'summary_large_image');
          setOrCreateMeta('twitter:title', fm.title || 'Raffael Kaas – Software Engineer');
          setOrCreateMeta('twitter:description', fm.description || '');
          setOrCreateMeta('twitter:image', ogImgAbs);

          const jsonLd = {
            '@context': 'https://schema.org',
            '@type': 'Article',
            headline: fm.title || '',
            datePublished: fm.date || undefined,
            dateModified: fm.lastmod || fm.date || undefined,
            author: {
              '@type': 'Person',
              name: fm.author || 'Raffael Kaas'
            },
            image: ogImgAbs,
            mainEntityOfPage: canonical,
            keywords: Array.isArray(fm.keywords) ? fm.keywords.join(', ') : undefined
          };
          const oldLd = document.querySelector('script[data-dynamic-jsonld="article"]');
          if (oldLd) oldLd.remove();
          const ldScript = document.createElement('script');
          ldScript.type = 'application/ld+json';
          ldScript.setAttribute('data-dynamic-jsonld', 'article');
          ldScript.textContent = JSON.stringify(jsonLd, null, 2);
          document.head.appendChild(ldScript);
        }
      } catch (error) {
        console.error('Error loading blog post:', error);
        blogContainer.innerHTML = '<p>Failed to load the blog post. Please try again later.</p>';
      }
    }
  
    document.addEventListener('DOMContentLoaded', loadBlogPost);
  </script>
</body>
</html>
